<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Punto Esencia | Perfumes Árabes</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/@phosphor-icons/web"></script>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
theme: {
extend: {
colors: {
gold: {
DEFAULT: '#D4AF37',
light: '#F3E5AB',
dark: '#AA8529'
}
},
fontFamily: {
display: ['Cinzel', 'serif'],
serif: ['Lora', 'serif'],
sans: ['Montserrat', 'sans-serif'],
}
}
}
}
</script>

<style>
body{background:#000}

.gold-gradient-text{
background:linear-gradient(to right,#D4AF37,#F3E5AB,#D4AF37);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.gold-border-hover{
transition:.4s
}

.gold-border-hover:hover{
border-color:#D4AF37;
box-shadow:0 10px 30px rgba(212,175,55,.1);
transform:translateY(-5px)
}

.brand-section{scroll-margin-top:120px}

.img-container{background:#0a0a0a;position:relative}

.img-fallback{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
font-family:'Cinzel',serif;
font-size:10px;
color:#D4AF37;
text-transform:uppercase;
letter-spacing:2px
}

.cart-drawer{
transition:.5s;
transform:translateX(100%)
}

.cart-drawer.open{
transform:translateX(0)
}
</style>
</head>

<body class="font-sans text-gray-300">

<nav class="fixed w-full z-50 bg-black/80 border-b border-white/5" id="navbar">

<div class="max-w-7xl mx-auto px-4">

<div class="flex justify-between items-center h-20">

<div class="font-display text-xl text-white tracking-widest">
<span class="gold-gradient-text">PUNTO</span> ESENCIA
</div>

<div class="flex items-center gap-6">

<a href="https://instagram.com/thiagoalfonso__" target="_blank">
<i class="ph ph-instagram-logo text-2xl"></i>
</a>

<button onclick="toggleCart()" class="relative">

<i class="ph ph-shopping-bag text-2xl"></i>

<span id="cart-counter" class="absolute -top-2 -right-2 bg-gold text-black text-xs w-4 h-4 flex items-center justify-center rounded-full opacity-0">
0
</span>

</button>

</div>

</div>

</div>

</nav>

<section class="h-screen flex items-center justify-center">

<h1 class="text-6xl font-display text-white text-center">
Catálogo <span class="gold-gradient-text">Perfumes</span>
</h1>

</section>

<div class="max-w-7xl mx-auto px-6 py-24">

<div id="brands-container"></div>

</div>

<div id="cart-overlay" onclick="toggleCart()" class="fixed inset-0 bg-black/80 hidden"></div>

<aside id="cart-drawer" class="fixed top-0 right-0 h-full w-full max-w-md bg-black z-50 cart-drawer border-l border-white/10 flex flex-col">

<div class="p-8 border-b border-white/5 flex justify-between">

<h3 class="font-display text-xl text-white">Tu Selección</h3>

<button onclick="toggleCart()">
<i class="ph ph-x text-2xl"></i>
</button>

</div>

<div id="cart-items" class="flex-grow overflow-y-auto p-8 space-y-6"></div>

<div class="p-8 border-t border-white/5">

<div class="flex justify-between mb-6">

<span>Total</span>

<span id="cart-total">$0</span>

</div>

<button onclick="enviarWhatsAppPedido()" class="w-full bg-gold text-black py-3 font-bold">
Enviar pedido por WhatsApp
</button>

</div>

</aside>

<script>

const WHATSAPP_NUMBER="5491127290192"

const formatPrice=(price)=>{
if(price===0)return"Consultar"
return new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(price)
}

const allProducts={
Lattafa:[
{name:"Vintage radio",price:2000,img:"https://acdn-us.mitiendanube.com/stores/005/620/060/products/0-10-10-43a0cbc15fd1a5f86417517536178045-640-0.webp"},
{name:"Asad",price:0,img:"https://acdn-us.mitiendanube.com/stores/002/485/347/products/baixados-13-1b48631333c7ffa0be17036948037801-480-0.webp"}
],

Rasasi:[
{name:"Hawas ice",price:0,img:"https://nextcell.com.ar/wp-content/uploads/2025/06/155854-b-hawas-ice-men-edp-100ml-copia.jpg"}
],

Afnan:[
{name:"9pm",price:0,img:"https://acdn-us.mitiendanube.com/stores/005/555/154/products/afnan-9-pm-perfume-arabe-fraganciasdeoriente-com-ar-f0afef210413b221cf17342422458225-1024-1024.webp"}
]
}

let cart=[]

function contactWhatsApp(productName){

const message=`Hola! Me interesa el perfume ${productName} de Punto Esencia.`

const url=`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`

window.open(url,'_blank')

}

function addToCart(name,price,img){

const exists=cart.find(i=>i.name===name)

if(exists)exists.quantity++
else cart.push({name,price,img,quantity:1})

updateCartUI()

}

function toggleCart(){

document.getElementById('cart-drawer').classList.toggle('open')

document.getElementById('cart-overlay').classList.toggle('hidden')

}

function updateCartUI(){

const container=document.getElementById('cart-items')

const totalEl=document.getElementById('cart-total')

const counter=document.getElementById('cart-counter')

const totalQty=cart.reduce((sum,i)=>sum+i.quantity,0)

const totalPrice=cart.reduce((sum,i)=>sum+i.price*i.quantity,0)

counter.innerText=totalQty

counter.style.opacity=totalQty>0?1:0

totalEl.innerText=formatPrice(totalPrice)

if(cart.length===0){

container.innerHTML=`<p class="text-center text-white/30">Tu selección está vacía</p>`

return

}

container.innerHTML=cart.map(item=>`

<div class="flex gap-4">

<img src="${item.img}" class="w-16 h-20 object-cover">

<div>

<h4>${item.name}</h4>

<p>${formatPrice(item.price)}</p>

<p>Cantidad: ${item.quantity}</p>

</div>

</div>

`).join("")

}

function enviarWhatsAppPedido(){

if(cart.length===0)return

let msg="Hola Punto Esencia! Quisiera realizar un pedido de:\n\n"

let total=0

cart.forEach(i=>{

msg+=`• ${i.name} (${i.quantity}) - ${formatPrice(i.price*i.quantity)}\n`

total+=i.price*i.quantity

})

msg+=`\nTOTAL: ${formatPrice(total)}`

window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`,'_blank')

}

function createProductHTML(p){

return`

<div class="bg-[#050505] border border-white/10 p-6 flex flex-col">

<img src="${p.img}" class="mb-4">

<h3 class="text-white mb-2">${p.name}</h3>

<p class="text-gold mb-4">${formatPrice(p.price)}</p>

<button onclick="addToCart('${p.name}',${p.price},'${p.img}')" class="bg-gold text-black py-2 mb-2">
Agregar al pedido
</button>

<button onclick="contactWhatsApp('${p.name}')" class="border border-white py-2">
Consultar
</button>

</div>

`

}

function renderCatalog(){

const container=document.getElementById('brands-container')

container.innerHTML=""

Object.keys(allProducts).forEach(brand=>{

const section=document.createElement('section')

section.className="mb-20"

section.innerHTML=`

<h2 class="text-3xl text-white mb-10">${brand}</h2>

<div class="grid grid-cols-1 md:grid-cols-3 gap-10">

${allProducts[brand].map(createProductHTML).join("")}

</div>

`

container.appendChild(section)

})

}

document.addEventListener("DOMContentLoaded",()=>{

renderCatalog()

updateCartUI()

})

</script>

</body>
</html>
